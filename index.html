    <!-- Active Runtime Parser and Playback Control Script -->
    <script>
      /* 
         ========================================================================
         এম৩ইউ (M3U) প্লেলিস্ট কনফিগারেশন এরিয়া (বাংলায় নির্দেশনাবলী):
         ========================================================================
         নিচে আপনার দেওয়া m3u প্লেলিস্টের লিংকটি ডিফাইন করা রয়েছে। 
         আপনি চাইলে যেকোনো সময় নিচের 'm3uPlaylistUrl' এর ভেতরের লিংক পরিবর্তন করতে পারবেন।
         আমাদের স্ক্রিপ্টটি ডাইনামিকালি এক্সটেনশন যাচাই করে .mpd, .m3u8 এবং .ts ফাইল লোড করবে।
      */
      const m3uPlaylistUrl = "https://raw.githubusercontent.com/raid35/docs/main/SPORT_UROP.m3u";

      let parsedChannels = [];
      let shakaPlayerInstance = null;
      let activeChannel = null;
      let isMuted = false;
      let isPlaying = false;
      let availableTracks = [];
      let controlsTimeout = null;

      const videoElement = document.getElementById('liveVideo');
      const bufOverlay = document.getElementById('buffering-overlay');
      const errOverlay = document.getElementById('error-overlay');
      const errDetail = document.getElementById('error-detail');
      const qualSelect = document.getElementById('qualitySelect');
      const qualityBadge = document.getElementById('player-quality-badge');
      const playIcon = document.getElementById('play-btn-icon');
      const muteIcon = document.getElementById('mute-btn-icon');
      const playerControls = document.getElementById('playerControls');
      const chDisplay = document.getElementById('player-channel-display');

      function showToast(message) {
        const toast = document.getElementById('toast');
        const textNode = document.getElementById('toast-text');
        textNode.innerText = message;
        toast.classList.remove('hidden');
        setTimeout(() => { toast.classList.add('hidden'); }, 3000);
      }

      function handleUserInteraction() {
        playerControls.classList.remove('opacity-0');
        playerControls.classList.add('opacity-100');
        
        if (controlsTimeout) clearTimeout(controlsTimeout);
        
        controlsTimeout = setTimeout(() => {
          if (isPlaying) {
            playerControls.classList.remove('opacity-100');
            playerControls.classList.add('opacity-0');
          }
        }, 3500);
      }

      /* 
         ========================================================================
         উন্নত M3U প্লেলিস্ট পার্সার ইঞ্জিন:
         ========================================================================
         এই ফাংশনটি স্বয়ংক্রিয়ভাবে প্লেলিস্টের #EXTINF মেটাডাটা এবং তার ঠিক নিচের 
         #KODIPROP ক্লিয়ার-কি লাইসেন্স প্যারামিটার ও ইউজার এজেন্টগুলো রিড করে ডাটাবেজ তৈরি করে।
      */
      async function fetchAndParseM3U(url) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error('Failed to load playlist from server.');
          const text = await response.text();
          const lines = text.split('\n');
          
          const channels = [];
          let currentChannel = null;

          for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            if (line.startsWith('#EXTINF:')) {
              // আগের চ্যানেলটি পুশ করে নেওয়া হচ্ছে যদি তার সঠিক ইউআরএল থাকে
              if (currentChannel && currentChannel.url) {
                channels.push(currentChannel);
              }

              currentChannel = {
                name: 'Unnamed Channel',
                logo: '',
                url: '',
                isDrm: false,
                drmKeys: {},
                userAgent: ''
              };

              // Extract tvg-logo
              const logoMatch = line.match(/tvg-logo="([^"]+)"/);
              if (logoMatch) currentChannel.logo = logoMatch[1];

              // Extract channel name (located after the last comma)
              const commaIndex = line.lastIndexOf(',');
              if (commaIndex !== -1) {
                currentChannel.name = line.substring(commaIndex + 1).trim();
              }
            } else if (line.startsWith('#EXTVLCOPT:')) {
              if (!currentChannel) continue;
              if (line.includes('http-user-agent=')) {
                currentChannel.userAgent = line.split('http-user-agent=')[1].trim();
              }
            } else if (line.startsWith('#KODIPROP:')) {
              if (!currentChannel) continue;
              const propLine = line.substring(10).trim(); // skip "#KODIPROP:"
              const eqIdx = propLine.indexOf('=');
              if (eqIdx !== -1) {
                const key = propLine.substring(0, eqIdx).trim();
                const val = propLine.substring(eqIdx + 1).trim();

                if (key.includes('license_type')) {
                  if (val.toLowerCase().includes('clearkey')) {
                    currentChannel.isDrm = true;
                  }
                } else if (key.includes('license_key')) {
                  currentChannel.isDrm = true;
                  try {
                    if (val.startsWith('{')) {
                      // JSON Format: {"kid":"key"}
                      const parsedKeys = JSON.parse(val);
                      for (let k in parsedKeys) {
                        const cleanK = k.toLowerCase().replace(/[^a-f0-9]/gi, '');
                        const cleanV = parsedKeys[k].toLowerCase().replace(/[^a-f0-9]/gi, '');
                        currentChannel.drmKeys[cleanK] = cleanV;
                      }
                    } else {
                      // Hex Format: kid:key
                      const parts = val.split(':');
                      if (parts.length === 2) {
                        const cleanK = parts[0].toLowerCase().trim().replace(/[^a-f0-9]/gi, '');
                        const cleanV = parts[1].toLowerCase().trim().replace(/[^a-f0-9]/gi, '');
                        currentChannel.drmKeys[cleanK] = cleanV;
                      }
                    }
                  } catch (e) {
                    console.error("DRM key parse error:", e);
                  }
                }
              }
            } else if (line.startsWith('http://') || line.startsWith('https://')) {
              if (currentChannel) {
                currentChannel.url = line;
                channels.push(currentChannel);
                currentChannel = null; 
              }
            }
          }

          if (currentChannel && currentChannel.url) {
            channels.push(currentChannel);
          }

          return channels;
        } catch (err) {
          console.error("M3U Parser error:", err);
          return [];
        }
      }

      /* 
         ========================================================================
         ৩-কলাম গ্রিড রেন্ডার ফাংশন (লগো ওপরে, নাম নিচে):
         ========================================================================
      */
      function renderChannelsGrid() {
        const grid = document.getElementById('channels-grid');
        grid.innerHTML = '';

        parsedChannels.forEach((ch, idx) => {
          const isActive = activeChannel && ch.url === activeChannel.url;
          const card = document.createElement('button');
          
          card.className = `p-2.5 rounded-xl border flex flex-col items-center justify-center text-center w-full transition-all outline-none group ${
            isActive 
              ? 'bg-[#160d30] border-[#dd2476] shadow-md shadow-[#dd2476]/10' 
              : 'bg-[#0e081f]/95 border-[#2e1b5b]/50 hover:border-white/10'
          }`;
          
          card.onclick = () => selectChannel(idx);

          card.innerHTML = `
            <div class="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-lg p-1 flex items-center justify-center overflow-hidden mb-2 shadow-inner group-hover:scale-105 transition-all">
              <img src="${ch.logo}" alt="" class="max-h-full max-w-full object-contain" onerror="this.src='https://i.postimg.cc/2SPC4wwN/hd-official-2026-fifa-world-cup-transparent-png-701751712076865bw3umpw9lk.png';" />
            </div>
            <span class="text-[10px] sm:text-xs font-bold truncate w-full tracking-wide ${isActive ? 'text-[#00c6ff]' : 'text-gray-300 group-hover:text-white'}">
              ${ch.name}
            </span>
          `;
          grid.appendChild(card);
        });
      }

      async function initApp() {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
          console.error('Browser does not support secure DRM stream playback.');
        }

        document.getElementById('buffering-detail').innerText = "Loading remote playlist...";
        parsedChannels = await fetchAndParseM3U(m3uPlaylistUrl);

        if (parsedChannels.length > 0) {
          activeChannel = parsedChannels[0];
          renderChannelsGrid();
          await loadChannelStream(activeChannel);
        } else {
          bufOverlay.classList.add('hidden');
          errOverlay.classList.remove('hidden');
          errDetail.innerText = "Error: Could not load or parse the remote M3U file.";
        }
      }

      /* 
         ========================================================================
         ডাইনামিক স্ট্রিম প্লে ব্যাক ইঞ্জিন:
         ========================================================================
      */
      async function loadChannelStream(channel) {
        bufOverlay.classList.remove('hidden');
        errOverlay.classList.add('hidden');
        chDisplay.innerText = channel.name;

        qualSelect.innerHTML = '<option value="auto">Auto Quality</option>';
        qualSelect.value = 'auto';

        if (shakaPlayerInstance) {
          try {
            await shakaPlayerInstance.destroy();
          } catch (e) {
            console.error(e);
          }
          shakaPlayerInstance = null;
        }

        const isTsStream = channel.url.toLowerCase().endsWith('.ts') || channel.url.includes('extension=ts') || channel.url.includes('/live/');

        /* 
           ১. যদি সাধারণ সরাসরি TS স্ট্রিম বা রিডাইরেক্ট স্ট্রিম হয়, তবে ব্রাউজারের নেটিভ প্লেয়ার বা ডিরেক্ট HTML সোর্স দিয়ে চালানোর হবে, 
           কারণ সরাসরি TS ফাইল Shaka Media Engine অনেক সময় ব্লক করতে পারে।
        */
        if (isTsStream) {
          try {
            videoElement.removeAttribute('src');
            videoElement.src = channel.url;
            
            videoElement.onwaiting = () => { bufOverlay.classList.remove('hidden'); };
            videoElement.onplaying = () => { bufOverlay.classList.add('hidden'); };

            videoElement.muted = isMuted;
            await videoElement.play();
            isPlaying = true;
            updatePlayUI(true);
            bufOverlay.classList.add('hidden');
            return;
          } catch (err) {
            console.warn("Native TS load fallback error, trying Shaka Engine...", err);
          }
        }

        // ২. DASH (.mpd) এবং HLS (.m3u8) স্ট্রিমের জন্য Shaka Player রান করা হবে
        try {
          const player = new shaka.Player();
          await player.attach(videoElement);
          shakaPlayerInstance = player;

          player.addEventListener('error', (e) => {
            handleStreamFailure(e.detail);
          });

          player.configure({
            streaming: {
              bufferingGoal: 25, 
              rebufferingGoal: 6,
              bufferBehind: 30,
              stallEnabled: true,
              stallThreshold: 2.0,
              stallSkip: 0.2
            },
            abr: { enabled: true }
          });

          // কাস্টম ইউজার এজেন্ট কনফিগারেশন হ্যান্ডলিং (যদি হেডার অ্যালাউ করে)
          if (channel.userAgent) {
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
              request.headers['User-Agent'] = channel.userAgent;
            });
          }

          // স্বয়ংক্রিয়ভাবে M3U প্লেলিস্ট থেকে পার্স করা ClearKey জোড়াগুলো এখানে লোড করা হচ্ছে
          if (channel.isDrm && channel.drmKeys && Object.keys(channel.drmKeys).length > 0) {
            player.configure({
              drm: { clearKeys: channel.drmKeys }
            });
          }

          videoElement.onwaiting = () => { bufOverlay.classList.remove('hidden'); };
          videoElement.onplaying = () => { bufOverlay.classList.add('hidden'); };

          await player.load(channel.url);

          const tracks = player.getVariantTracks();
          if (tracks && tracks.length > 0) {
            availableTracks = tracks;
            const sortedTracks = [...tracks].sort((a, b) => (b.height || 0) - (a.height || 0));
            const seenHeights = new Set();
            sortedTracks.forEach(track => {
              if (track.height && !seenHeights.has(track.height)) {
                seenHeights.add(track.height);
                const opt = document.createElement('option');
                opt.value = `track:${track.id}`;
                opt.innerText = `${track.height}p`;
                qualSelect.appendChild(opt);
              }
            });
          }

          videoElement.muted = isMuted;
          await videoElement.play();
          isPlaying = true;
          updatePlayUI(true);

        } catch (err) {
          handleStreamFailure(err);
        }
      }

      function handleStreamFailure(err) {
        bufOverlay.classList.add('hidden');
        errOverlay.classList.remove('hidden');
        errDetail.innerText = `Decoder error code: ${err.code || 'Decoding or Connection Timeout'}`;
      }

      function selectChannel(index) {
        if (parsedChannels[index]) {
          activeChannel = parsedChannels[index];
          renderChannelsGrid();
          loadChannelStream(activeChannel);
          showToast(`Swapped: ${activeChannel.name}`);
        }
      }

      function retryCurrentChannel() {
        if (activeChannel) loadChannelStream(activeChannel);
      }

      function togglePlay() {
        if (!videoElement) return;
        if (videoElement.paused) {
          videoElement.play();
          isPlaying = true;
          updatePlayUI(true);
        } else {
          videoElement.pause();
          isPlaying = false;
          updatePlayUI(false);
        }
      }

      function updatePlayUI(playing) {
        if (playing) {
          playIcon.setAttribute('data-lucide', 'pause');
        } else {
          playIcon.setAttribute('data-lucide', 'play');
        }
        lucide.createIcons();
      }

      function toggleMute() {
        isMuted = !isMuted;
        videoElement.muted = isMuted;
        if (isMuted) {
          muteIcon.setAttribute('data-lucide', 'volume-x');
          muteIcon.classList.add('text-red-500');
        } else {
          muteIcon.setAttribute('data-lucide', 'volume-2');
          muteIcon.classList.remove('text-red-500');
        }
        lucide.createIcons();
      }

      function handleQualitySelection(val) {
        if (!shakaPlayerInstance) return;
        if (val === 'auto') {
          shakaPlayerInstance.configure({ abr: { enabled: true } });
          qualityBadge.innerText = "AUTO";
          showToast('Smart Auto Quality enabled.');
        } else if (val.startsWith('track:')) {
          const trackId = parseInt(val.split(':')[1], 10);
          const track = availableTracks.find(t => t.id === trackId);
          if (track) {
            shakaPlayerInstance.configure({ abr: { enabled: false } });
            shakaPlayerInstance.selectVariantTrack(track, true);
            qualityBadge.innerText = `${track.height}p`;
            showToast(`Forced set: ${track.height}p`);
          }
        }
      }

      function togglePiP() {
        if (document.pictureInPictureElement) {
          document.exitPictureInPicture();
        } else if (videoElement.requestPictureInPicture) {
          videoElement.requestPictureInPicture();
        }
      }

      async function toggleFullscreen() {
        const pcard = document.getElementById('playerCard');
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          if (pcard.requestFullscreen) {
            await pcard.requestFullscreen();
          } else if (videoElement.webkitEnterFullscreen) {
            videoElement.webkitEnterFullscreen();
          }
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          }
        }
      }

      document.addEventListener('fullscreenchange', () => {
        const pcard = document.getElementById('playerCard');
        if (pcard) {
          if (document.fullscreenElement) pcard.classList.add('fullscreen-mode');
          else pcard.classList.remove('fullscreen-mode');
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74))) {
          e.preventDefault();
          showToast('Debugging locked.');
        }
      });

      window.addEventListener('DOMContentLoaded', () => {
        initApp();
        lucide.createIcons();
      });
    </script>
  </body>
</html>
